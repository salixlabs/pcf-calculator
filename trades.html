<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCF - Trades | salix.agency</title>
    <link rel="stylesheet" href="css/main.css">
    <script>
        // Check if logged in
        if (localStorage.getItem('pcfLoggedIn') !== 'true') {
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <div class="container">
        <button class="logout-button" onclick="logout()">Logout</button>
        <div class="content-header">
            <a href="index.html">
                <img src="Assets/logo/PCF Logo.png" alt="PCF Logo">
            </a>
            <h1>Select Trade</h1>
        </div>
        <div class="button-grid">
            <a href="trades/decking/index.html" class="nav-button">
                <img src="Assets/logo/PCF Logo.png" alt="Decking">
                <h2>Decking</h2>
                <p>Deck calculator and photo galleries</p>
            </a>
            <a href="trades/other/index.html" class="nav-button">
                <img src="Assets/logo/PCF Logo.png" alt="Other Trades">
                <h2>Other Trades</h2>
                <p>Specialized calculators</p>
            </a>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('pcfLoggedIn');
            window.location.href = '/';
        }
    </script>
</body>
</html>
